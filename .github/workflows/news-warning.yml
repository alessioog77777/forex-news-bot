name: USD News Warning

on:
  schedule:
    - cron: "*/5 * * * *"

  workflow_dispatch:
    inputs:
      send_test:
        description: "Send a Discord test warning"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: usd-news-warning
  cancel-in-progress: false

jobs:
  check-upcoming-news:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Restore sent-warning state
        uses: actions/cache/restore@v5
        with:
          path: .warning-state
          key: >-
            usd-warning-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            usd-warning-state-

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check upcoming USD news
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SEND_TEST_WARNING: >-
            ${{ github.event_name == 'workflow_dispatch'
            && inputs.send_test || false }}
        run: python news_warning.py

      - name: Save sent-warning state
        if: success()
        uses: actions/cache/save@v5
        with:
          path: .warning-state
          key: >-
            usd-warning-state-${{ github.run_id }}-${{ github.run_attempt }}
