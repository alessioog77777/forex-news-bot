name: Daily USD Forex News

on:
  schedule:
    - cron: "1 0 * * *"
      timezone: "Europe/Zurich"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: forex-discord-messages
  cancel-in-progress: false

jobs:
  post-news:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Restore daily-message state
        uses: actions/cache/restore@v5
        with:
          path: .bot-state
          key: >-
            daily-message-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            daily-message-

      - name: Restore warning state
        uses: actions/cache/restore@v5
        with:
          path: .warning-state
          key: >-
            usd-warning-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            usd-warning-

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Delete old posts and send today's news
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python forex_news.py

      - name: Save daily-message state
        if: success()
        uses: actions/cache/save@v5
        with:
          path: .bot-state
          key: >-
            daily-message-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Save cleared warning state
        if: success()
        uses: actions/cache/save@v5
        with:
          path: .warning-state
          key: >-
            usd-warning-${{ github.run_id }}-${{ github.run_attempt }}
