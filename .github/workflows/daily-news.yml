name: Daily USD Forex News

on:
  schedule:
    - cron: "1 0 * * *"
      timezone: "Europe/Zurich"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-forex-news
  cancel-in-progress: false

jobs:
  post-news:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Restore previous message state
        uses: actions/cache/restore@v4
        with:
          path: .bot-state
          key: discord-message-${{ github.run_id }}
          restore-keys: |
            discord-message-

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run forex news bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python forex_news.py

      - name: Save current message state
        if: success()
        uses: actions/cache/save@v4
        with:
          path: .bot-state
          key: discord-message-${{ github.run_id }}
